<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dream.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>My Dream Wall</title>
</head>

<body>
    <header>
        <nav class="header">
            <div class="nav-left">
                <div class="logo">DreamConnect</div>
            </div>
            <div class="nav-right">
                <div class="nav-item">
                    <a href="home-page1.html" class="no-underline">Home</a>
                </div>
                <div class="nav-item">
                    <a href="explore1.html" class="no-underline">Explore</a>
                </div>
                <div class="nav-item">
                    <a href="dream.html" class="no-underline">My Dream Wall</a>
                </div>
                <div class="nav-item">
                    <a href="community.html" class="no-underline">Community</a>
                </div>
                <div class="nav-item">
                    <a href="" class="no-underline">Contact Us</a>
                </div>
                <div class="user">
                    <a href="" class="no-underline">
                        <img class="profile-img" src="img/profile.jpg" alt="Profile">
                    </a>
                </div>
            </div>
        </nav>
    </header>
    <div class="main_plate">
        <!-- <div class="main_plate_cover"></div> -->
        <button class="Add_button">Add your dream</button>
        <!-- <div class="heading">My Dream Wall</div> -->
        <div class="dream_block">
            <input class="dream_text" type="text" placeholder="Describe your dream" />
            <button class="SAVE">SAVE</button>
            <button class="EDIT">EDIT</button>
            <button class="POST">POST</button>
            <button class="delete-btn">
                <i class="fas fa-trash"></i>
            </button>

        </div>

        <div class="dream_block1">
            <input class="dream_text1" type="text" placeholder="TO BECOME A FULL STACK DEVELOPER" />
            <button class="Done">Done</button>
            <button class="delete-btn">
                <i class="fas fa-trash"></i>
            </button>
        </div>

        <div class="progress">
            <p class="progress_text">PROGRESS</p>
            <div class="circle-wrap">
                <div class="circle">
                    <div class="mask full">
                        <div class="fill"></div>
                    </div>
                    <div class="mask half">
                        <div class="fill"></div>
                    </div>
                    <div class="inside-circle">50%</div>
                </div>
            </div>

            <ul class="texty">
                <li>Completed-1</li>
                <li>Not Completed</li>
            </ul>
        </div>
    </div>
</body>

</html>
