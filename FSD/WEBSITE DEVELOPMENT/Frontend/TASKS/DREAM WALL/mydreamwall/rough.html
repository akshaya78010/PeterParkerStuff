<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Enhanced Progress Tracker</title>
    <style>
        body {
            background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px;
            color: #1e3d59;
        }

        .progress-section {
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            width: 80%;
            max-width: 700px;
            margin: auto;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .progress-section h2 {
            font-size: 28px;
            margin-bottom: 25px;
            color: #333;
        }

        .circular-progress {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 8px solid #4ee6a5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #1e3d59;
            font-weight: bold;
            font-size: 18px;
            background: #fff8f1;
        }

        .progress-bar-container {
            margin: 20px auto;
            width: 100%;
        }

        .progress-bar {
            background: #ffe6e1;
            border-radius: 10px;
            overflow: hidden;
            height: 20px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #f77062, #fe5196);
            width: 20%;
            transition: width 0.5s ease-in-out;
        }

        .progress-percent {
            margin-top: 8px;
            color: #1e3d59;
            font-weight: 600;
        }

        .task-sections {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
            text-align: left;
        }

        .task-box {
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .task-box h3 {
            margin-top: 0;
            font-size: 18px;
            color: #2c3e50;
        }

        .task-box ul {
            padding-left: 20px;
        }

        .task-box li {
            margin: 6px 0;
        }

        .priority {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .high {
            background: #ff6b6b;
        }

        .medium {
            background: #f8c471;
        }

        .low {
            background: #58d68d;
        }

        .quote {
            margin-top: 30px;
            font-style: italic;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 20px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="progress-section">
        <h2>My Progress</h2>
        <div class="circular-progress">20%</div>
        <div class="progress-bar-container">
            <div class="progress-bar">
                <div class="fill"></div>
            </div>
            <div class="progress-percent">Progress: 20%</div>
        </div>

        <div class="task-sections">
            <div class="task-box">
                <h3>✅ Completed Tasks</h3>
                <ul>
                    <li>HTML Basics</li>
                    <li>CSS Styling</li>
                </ul>
            </div>

            <div class="task-box">
                <h3>🔄 In Progress</h3>
                <ul>
                    <li><span class="priority medium"></span>JavaScript Introduction</li>
                    <li><span class="priority medium"></span>DOM Manipulation</li>
                </ul>
            </div>

            <div class="task-box">
                <h3>📋 Not Started</h3>
                <ul>
                    <li><span class="priority high"></span>API Integration</li>
                    <li><span class="priority high"></span>React Basics</li>
                </ul>
            </div>

            <div class="task-box">
                <h3>🚧 Stuck</h3>
                <ul>
                    <li><span class="priority high"></span>Responsive Design</li>
                </ul>
            </div>
        </div>

        <div class="quote">
            "Progress is progress, no matter how small. Keep moving forward!"
        </div>
    </div>
</body>

</html>
